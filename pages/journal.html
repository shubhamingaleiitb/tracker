<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Journal — Document Your Progress</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="topnav">
  <div class="topnav-inner">
    <a class="logo" href="../index.html">RE<span>Tracker</span></a>
    <nav>
      <a href="../index.html">Dashboard</a>
      <a href="monthly-plan.html">Monthly Plan</a>
      <a href="journal.html">Journal</a>
      <a href="resources.html">Resources</a>
    </nav>
  </div>
</div>

<div class="container">
  <div class="page-header">
    <h1>Learning Journal</h1>
    <p>Document what you learn, paper analyses, reimplementation notes, experiment results, and reflections.</p>
  </div>

  <!-- New Entry Form -->
  <div class="card" id="entryForm">
    <h2>New Entry</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="entryDate">
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="entryCategory">
          <option value="paper-analysis">Paper Analysis</option>
          <option value="reimplementation">Reimplementation Notes</option>
          <option value="experiment">Experiment Results</option>
          <option value="learning">Learning Notes</option>
          <option value="project">Project Update</option>
          <option value="reflection">Reflection</option>
          <option value="blog-draft">Blog Draft</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Title</label>
      <input type="text" id="entryTitle" placeholder="e.g., Flash Attention paper — key insights on tiling">
    </div>
    <div class="form-group">
      <label>Content</label>
      <textarea id="entryContent" rows="8" placeholder="What did you learn? What surprised you? What would you do differently?

For paper analyses:
- Core idea in your own words
- What's novel vs borrowed
- One thing you'd do differently

For reimplementations:
- What worked, what was hard
- What the paper doesn't tell you
- Performance observations"></textarea>
    </div>
    <div class="form-group">
      <label>Tags (comma-separated)</label>
      <input type="text" id="entryTags" placeholder="e.g., transformer, attention, pytorch, triton">
    </div>
    <button class="btn btn-primary" id="saveEntry">Save Entry</button>
  </div>

  <!-- Filter -->
  <div style="display:flex;gap:0.75rem;align-items:center;margin-bottom:1rem;flex-wrap:wrap;">
    <span style="font-size:0.85rem;color:var(--text-dim);">Filter:</span>
    <select id="filterCategory" style="width:auto;">
      <option value="all">All Categories</option>
      <option value="paper-analysis">Paper Analysis</option>
      <option value="reimplementation">Reimplementation</option>
      <option value="experiment">Experiment</option>
      <option value="learning">Learning Notes</option>
      <option value="project">Project Update</option>
      <option value="reflection">Reflection</option>
      <option value="blog-draft">Blog Draft</option>
    </select>
    <input type="text" id="filterSearch" placeholder="Search entries..." style="width:auto;max-width:250px;">
  </div>

  <!-- Entries -->
  <div id="journalEntries"></div>
</div>

<script src="../js/store.js"></script>
<script src="../js/app.js"></script>
<script>
  const categoryLabels = {
    'paper-analysis': 'Paper Analysis',
    'reimplementation': 'Reimplementation',
    'experiment': 'Experiment',
    'learning': 'Learning Notes',
    'project': 'Project Update',
    'reflection': 'Reflection',
    'blog-draft': 'Blog Draft',
  };

  const categoryColors = {
    'paper-analysis': 'tag-paper',
    'reimplementation': 'tag-code',
    'experiment': 'tag-course',
    'learning': 'tag-book',
    'project': 'tag-blog',
    'reflection': 'tag-essay',
    'blog-draft': 'tag-docs',
  };

  // Set default date to today
  document.getElementById('entryDate').valueAsDate = new Date();

  function renderEntries() {
    const entries = Store.getJournal();
    const filter = document.getElementById('filterCategory').value;
    const search = document.getElementById('filterSearch').value.toLowerCase();
    const container = document.getElementById('journalEntries');

    const filtered = entries.filter(e => {
      if (filter !== 'all' && e.category !== filter) return false;
      if (search && !e.title.toLowerCase().includes(search) && !e.content.toLowerCase().includes(search) && !(e.tags || []).some(t => t.toLowerCase().includes(search))) return false;
      return true;
    });

    if (!filtered.length) {
      container.innerHTML = '<div class="empty-state"><p>No journal entries yet. Start documenting your learning!</p></div>';
      return;
    }

    container.innerHTML = filtered.map(e => `
      <div class="journal-entry" data-id="${e.id}">
        <div class="flex-between">
          <div>
            <span class="entry-date">${e.date}</span>
            <span class="tag ${categoryColors[e.category] || 'tag-book'}" style="margin-left:0.5rem;">${categoryLabels[e.category] || e.category}</span>
          </div>
          <div style="display:flex;gap:0.5rem;">
            <button class="btn btn-ghost btn-edit" data-id="${e.id}" style="padding:0.3rem 0.6rem;font-size:0.75rem;">Edit</button>
            <button class="btn btn-danger btn-delete" data-id="${e.id}" style="padding:0.3rem 0.6rem;font-size:0.75rem;">Delete</button>
          </div>
        </div>
        <div class="entry-title">${escapeHtml(e.title)}</div>
        <div class="entry-body">${escapeHtml(e.content)}</div>
        ${(e.tags && e.tags.length) ? `
          <div class="entry-tags">
            ${e.tags.map(t => `<span class="badge badge-accent">${escapeHtml(t)}</span>`).join('')}
          </div>
        ` : ''}
      </div>
    `).join('');

    // Bind delete buttons
    container.querySelectorAll('.btn-delete').forEach(btn => {
      btn.addEventListener('click', () => {
        if (confirm('Delete this entry?')) {
          Store.deleteJournalEntry(btn.dataset.id);
          renderEntries();
        }
      });
    });

    // Bind edit buttons
    container.querySelectorAll('.btn-edit').forEach(btn => {
      btn.addEventListener('click', () => {
        const entry = Store.getJournal().find(e => e.id === btn.dataset.id);
        if (!entry) return;
        document.getElementById('entryDate').value = entry.date;
        document.getElementById('entryCategory').value = entry.category;
        document.getElementById('entryTitle').value = entry.title;
        document.getElementById('entryContent').value = entry.content;
        document.getElementById('entryTags').value = (entry.tags || []).join(', ');
        // Delete old and save will create new
        Store.deleteJournalEntry(entry.id);
        renderEntries();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });
  }

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  // Save
  document.getElementById('saveEntry').addEventListener('click', () => {
    const title = document.getElementById('entryTitle').value.trim();
    const content = document.getElementById('entryContent').value.trim();
    if (!title) { alert('Please enter a title.'); return; }

    const entry = {
      date: document.getElementById('entryDate').value,
      category: document.getElementById('entryCategory').value,
      title,
      content,
      tags: document.getElementById('entryTags').value.split(',').map(t => t.trim()).filter(Boolean),
    };

    Store.addJournalEntry(entry);
    document.getElementById('entryTitle').value = '';
    document.getElementById('entryContent').value = '';
    document.getElementById('entryTags').value = '';
    renderEntries();
  });

  // Filters
  document.getElementById('filterCategory').addEventListener('change', renderEntries);
  document.getElementById('filterSearch').addEventListener('input', renderEntries);

  renderEntries();
</script>

</body>
</html>
